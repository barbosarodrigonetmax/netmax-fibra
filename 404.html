<!DOCTYPE html>
<!--
    ===================================================================
    NETMAX FIBRA - PÁGINA DE ERRO 404 (NÃO ENCONTRADO)
    ===================================================================
    Objetivo: "Página amigável de erro 404 para quando o usuário tenta
               acessar uma URL inexistente. Contém mensagem humorística,
               botão para voltar à página inicial e um botão de surpresa
               interativo. Deve ser colocada na raiz do site e configurada
               no servidor como página de erro padrão. Mantém a identidade
               visual da Netmax com logo e cores da marca."
    Autor   : Rodrigo Barbosa
    Data    : 23/02/2026
    ===================================================================
-->
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops! Página não encontrada</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon_netmax.png" />
    <link rel="shortcut icon" type="image/png" href="favicon_netmax.png" />
    <!-- Link para o CSS principal (caminho corrigido) -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- Estilo adicional específico para a página 404 com responsividade -->
    <style>
        /* Estilos específicos para a página 404 */
        .container {
            max-width: 800px;
            margin: 50px auto;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #fff9e6, #ffffff);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 2px solid #FFD000;
        }
        .logo {
            width: 200px;
            margin-bottom: 30px;
            max-width: 100%;
            height: auto;
        }
        .titulo {
            font-size: 5rem;
            color: #f24f00;
            text-shadow: 0 0 20px #ffaa00;
            margin-bottom: 20px;
            animation: firePulse 1.2s infinite ease-in-out;
        }
        .mensagem {
            font-size: 1.4rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            background: #f24f00;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(255,208,0,0.3);
        }
        .btn:hover {
            background: #FFD000;
            transform: scale(1.05);
        }
        .btn2 {
            background: #000;
            color: #FFD000;
            border: 2px solid #FFD000;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }
        .btn2:hover {
            background: #FFD000;
            color: #000;
        }
        .piadinha {
            font-size: 1.1rem;
            color: #666;
            margin: 30px 0 20px;
            font-style: italic;
        }
        .resultado {
            font-size: 1.3rem;
            color: #f24f00;
            font-weight: bold;
            margin-top: 20px;
            min-height: 40px;
        }
        
        /* Media Queries para responsividade da página 404 */
        @media (max-width: 768px) {
            .container {
                margin: 30px 20px;
                padding: 30px 15px;
            }
            
            .logo {
                width: 150px;
                margin-bottom: 20px;
            }
            
            .titulo {
                font-size: 3.5rem;
            }
            
            .mensagem {
                font-size: 1.2rem;
            }
            
            .btn {
                padding: 12px 30px;
                font-size: 1.1rem;
            }
            
            .btn2 {
                padding: 10px 25px;
                font-size: 1rem;
            }
            
            .piadinha {
                font-size: 1rem;
            }
            
            .resultado {
                font-size: 1.1rem;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                margin: 20px 15px;
                padding: 25px 12px;
            }
            
            .logo {
                width: 120px;
                margin-bottom: 15px;
            }
            
            .titulo {
                font-size: 2.5rem;
            }
            
            .mensagem {
                font-size: 1rem;
            }
            
            .btn {
                padding: 10px 25px;
                font-size: 1rem;
            }
            
            .btn2 {
                padding: 8px 20px;
                font-size: 0.9rem;
            }
            
            .piadinha {
                font-size: 0.9rem;
                margin: 20px 0 15px;
            }
            
            .resultado {
                font-size: 1rem;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- CONTEÚDO DA PÁGINA 404 -->
    <div class="container">
        <!-- Logo da Netmax -->
        <img src="assets/images/logos/logo_netmax.jpg" alt="Netmax Tecnologia" class="logo">

        <h1 class="titulo">Error 404</h1>

        <p class="mensagem">
            Parece que você tentou acessar uma página que fugiu da Internet...  
            <br><strong>Mas fique tranquilo!</strong> Ela deve estar em algum lugar...  
            <br>Provavelmente tomando café. ☕💻
        </p>

        <!-- Botão para voltar à página inicial -->
        <button onclick="voltar()" class="btn">Voltar para o início</button>

        <p class="piadinha">Enquanto isso, aproveite esse botão totalmente funcional 👇</p>

        <!-- Botão de surpresa interativo -->
        <button onclick="surpresa()" class="btn2">Clique aqui 😄</button>

        <!-- Área para exibir o resultado da surpresa -->
        <p id="resultado" class="resultado"></p>
    </div>

    <!-- Script específico para a página 404 -->
    <script>
        // Função para voltar à página inicial
        function voltar() {
            window.location.href = 'index.html';
        }

        // Função de surpresa (exibe uma mensagem aleatória)
        function surpresa() {
            const frases = [
                "🎉 Parabéns! Você achou o botão secreto!",
                "📚 Já leu um livro hoje? A Estante Digital te espera!",
                "📰 Que tal ler as notícias no JornalZ?",
                "📺 E a Netmax TV? Já ativou a sua?",
                "⚡ 1000 megas de velocidade esperando por você!",
                "💛 Obrigado por visitar nosso site!",
                "☕ Achou que ia sair algo? Era só uma pausa pro café!"
            ];
            const randomIndex = Math.floor(Math.random() * frases.length);
            document.getElementById('resultado').textContent = frases[randomIndex];
        }

        // Também é possível registrar no console
        console.log("🚀 Página 404 carregada - Usuário perdido encontrado!");
    </script>

    <!-- Script principal (opcional) -->
    <script src="assets/js/script.js"></script>
</body>
</html>
