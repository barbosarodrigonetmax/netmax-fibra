<!doctype html>
<!--
    ===================================================================
    NETMAX FIBRA - PÁGINA DE ERRO 404 (NÃO ENCONTRADO)
    ===================================================================
    Objetivo: "Página amigável de erro 404 para quando o usuário tenta
               acessar uma URL inexistente. Contém mensagem humorística,
               botão para voltar à página inicial e um botão de surpresa
               interativo. Deve ser colocada na raiz do site e configurada
               no servidor como página de erro padrão. Mantém a identidade
               visual da Netmax com logo e cores da marca."
    Autor   : Rodrigo Barbosa
    Data    : 23/02/2026
    ===================================================================
-->
<!-- Declaração do tipo de documento HTML5 -->
<html lang="pt-BR">
  <!-- Início do elemento raiz HTML com idioma português do Brasil -->
  <head>
    <!--
      ===================================================================
      CABEÇALHO DA PÁGINA - METADADOS E RECURSOS EXTERNOS
      ===================================================================
    -->
    <!-- Define o conjunto de caracteres como UTF-8 para suporte a acentos e caracteres especiais -->
    <meta charset="UTF-8" />
    <!-- Configura a viewport para garantir responsividade em dispositivos móveis (escala inicial = 1) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Título exibido na aba do navegador (página de erro 404 amigável) -->
    <title>Ops! Página não encontrada</title>
    <!-- Favicon principal (ícone da aba do navegador) - versão PNG -->
    <link rel="icon" type="image/png" href="favicon_netmax.png" />
    <!-- Favicon alternativo com caminho mais específico dentro de assets (para compatibilidade) -->
    <link
      rel="shortcut icon"
      type="image/png"
      href="assets/images/outros/favicon_netmax.png"
    />
    <!-- Link para o arquivo CSS principal que contém todos os estilos da marca Netmax -->
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <!-- Fim do cabeçalho e início do corpo da página (conteúdo visível) -->
  <body>
    <!--
      ===================================================================
      CONTEÚDO PRINCIPAL DA PÁGINA 404
      ===================================================================
    -->
    <!-- Container principal para centralizar e estilizar o conteúdo da página de erro -->
    <div class="container">
      <!--
        LOGO DA NETMAX
        Exibe a logomarca da empresa para manter a identidade visual
        Atributo src: caminho da imagem dentro da pasta assets
        alt: texto alternativo para acessibilidade e SEO
        class: aplica estilos CSS definidos para a classe "logo"
      -->
      <img
        src="assets/images/logos/logo_netmax.jpg"
        alt="Netmax Tecnologia"
        class="logo"
      />

      <!--
        TÍTULO PRINCIPAL DO ERRO
        Exibe o código do erro HTTP (404) de forma destacada
        class: aplica estilos CSS para o título (fonte grande, cor da marca, etc.)
      -->
      <h1 class="titulo">Error 404</h1>

      <!--
        MENSAGEM AMIGÁVEL E HUMORÍSTICA
        Parágrafo com texto explicativo e tom descontraído para reduzir frustração do usuário
        Utiliza <strong> para dar ênfase em "Mas fique tranquilo!"
        Emoji de café e computador para tornar a mensagem mais leve
      -->
      <p class="mensagem">
        Parece que você tentou acessar uma página que fugiu da Internet...
        <br /><strong>Mas fique tranquilo!</strong> Ela deve estar em algum
        lugar... <br />Provavelmente tomando café. ☕💻
      </p>

      <!--
        BOTÃO PARA VOLTAR À PÁGINA INICIAL
        onclick: chama a função JavaScript "voltar()" definida no arquivo externo
        class: estilo CSS para botão primário (btn)
      -->
      <button onclick="voltar()" class="btn">Voltar para o início</button>

      <!--
        TEXTO DE APOIO PARA O BOTÃO SURPRESA
        Parágrafo simples que convida o usuário a interagir com o botão abaixo
        class: aplica estilo específico para "piadinha" (texto menor e divertido)
      -->
      <p class="piadinha">
        Enquanto isso, aproveite esse botão totalmente funcional 👇
      </p>

      <!--
        BOTÃO DE SURPRESA INTERATIVO
        onclick: chama a função JavaScript "surpresa()" que exibe uma mensagem ou ação divertida
        class: estilo CSS para botão secundário (btn2) com cores diferentes ou animação
      -->
      <button onclick="surpresa()" class="btn2">Clique aqui 😄</button>

      <!--
        ÁREA PARA EXIBIR O RESULTADO DA SURPRESA
        Parágrafo vazio inicialmente, mas será preenchido dinamicamente pelo JavaScript
        id "resultado" permite que o script localize e modifique o conteúdo deste elemento
        class: aplica estilos CSS para a área de resultado (margem, cor, etc.)
      -->
      <p id="resultado" class="resultado"></p>
    </div>
    <!-- Fim do container principal -->

    <!--
      ===================================================================
      SCRIPT PRINCIPAL (ARQUIVO EXTERNO)
      ===================================================================
      Importa o arquivo script.js que contém as funções:
      - voltar(): redireciona o usuário para a página inicial (geralmente "/" ou "index.html")
      - surpresa(): gera uma mensagem inesperada ou interação divertida no parágrafo #resultado
      O arquivo está localizado em assets/js/script.js conforme a estrutura de pastas do projeto
    -->
    <script src="assets/js/script.js"></script>
  </body>
  <!-- Fim do corpo da página -->
</html>
<!-- Fim do documento HTML -->
